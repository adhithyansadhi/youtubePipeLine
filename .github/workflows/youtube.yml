name: Daily YouTube Generator

on:
  schedule:
    - cron: '30 3 * * *'   # 9 AM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Install ffmpeg
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 5. Create .env
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env

      # 6. YouTube credentials
      - name: Create YouTube credentials
        run: echo "${{ secrets.YOUTUBE_CREDENTIALS }}" | base64 --decode > client_secret.json

      - name: Create YouTube token
        run: echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 --decode > token.json

      # 7. Run app + capture logs
      - name: Run your app
        id: run_app
        run: |
          python main.py > output.log 2>&1

      # ✅ SUCCESS EMAIL
      - name: Send success email
        if: success()
        run: |
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText
          import os

          msg = MIMEText("✅ YouTube video uploaded successfully today!")
          msg['Subject'] = "YouTube Automation Success"
          msg['From'] = os.environ['EMAIL_USER']
          msg['To'] = os.environ['EMAIL_TO']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login(os.environ['EMAIL_USER'], os.environ['EMAIL_PASS'])
              server.send_message(msg)
          EOF
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # ❌ FAILURE EMAIL
      - name: Send failure email
        if: failure()
        run: |
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText
          import os

          try:
              with open("output.log", "r") as f:
                  log = f.read()
          except:
              log = "No logs found."

          msg = MIMEText(f"❌ YouTube upload failed.\n\nError log:\n\n{log}")
          msg['Subject'] = "YouTube Automation Failed"
          msg['From'] = os.environ['EMAIL_USER']
          msg['To'] = os.environ['EMAIL_TO']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login(os.environ['EMAIL_USER'], os.environ['EMAIL_PASS'])
              server.send_message(msg)
          EOF
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}