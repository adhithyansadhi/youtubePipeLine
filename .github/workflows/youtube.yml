name: Daily YouTube Generator

on:
  schedule:
    - cron: '30 3 * * *'   # 9 AM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Cache pip dependencies
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Cache ffmpeg
      - name: Cache ffmpeg
        uses: actions/cache@v3
        with:
          path: ffmpeg-bin
          key: ffmpeg-${{ runner.os }}

      # 6. Setup ffmpeg (fast install)
      - name: Setup ffmpeg
        run: |
          if [ ! -d "ffmpeg-bin" ]; then
            mkdir ffmpeg-bin
            wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
            tar -xvf ffmpeg-release-amd64-static.tar.xz
            cp ffmpeg-*-static/ffmpeg ffmpeg-bin/
            cp ffmpeg-*-static/ffprobe ffmpeg-bin/
            chmod +x ffmpeg-bin/ffmpeg
            chmod +x ffmpeg-bin/ffprobe
          fi
          sudo cp ffmpeg-bin/ffmpeg /usr/local/bin/
          sudo cp ffmpeg-bin/ffprobe /usr/local/bin/

      # 7. Create .env file
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "HUGGINGFACE_API_KEY=${{ secrets.HUGGINGFACE_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "HF_MODEL=meta-llama/Llama-3.3-70B-Instruct" >> .env
          echo "HF_FACT_CHECK_MODEL=meta-llama/Llama-3.3-70B-Instruct" >> .env
          echo "HF_FALLBACK_MODEL=meta-llama/Llama-3.1-8B-Instruct" >> .env
          echo "NUM_SHORTS=3" >> .env
          echo "MOCK_MODE=false" >> .env
          echo "SKIP_VIDEO_RENDER=false" >> .env
          echo "YOUTUBE_UPLOAD_ENABLED=true" >> .env
          echo "YOUTUBE_PRIVACY_STATUS=private" >> .env
          echo "SCHEDULE_ENABLE=true" >> .env
          echo "SCHEDULE_TIME=20:00" >> .env
          echo "SCHEDULE_TIMEZONE=Asia/Kolkata" >> .env

      # 8. Create YouTube credentials
      - name: Create YouTube credentials
        run: echo "${{ secrets.YOUTUBE_CREDENTIALS }}" | base64 --decode > client_secret.json

      # 9. Create YouTube token
      - name: Create YouTube token
        run: echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 --decode > token.json

      # 10. Run app and capture logs
      - name: Run your app
        id: run_app
        run: |
          python main.py > output.log 2>&1

      # 11. Send SUCCESS email
      - name: Send success email
        if: success()
        run: |
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText
          import os

          msg = MIMEText("✅ YouTube video uploaded successfully today!")
          msg['Subject'] = "YouTube Automation Success"
          msg['From'] = os.environ['EMAIL_USER']
          msg['To'] = os.environ['EMAIL_TO']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login(os.environ['EMAIL_USER'], os.environ['EMAIL_PASS'])
              server.send_message(msg)
          EOF
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # 12. Send FAILURE email with logs
      - name: Send failure email
        if: failure()
        run: |
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText
          import os

          try:
              with open("output.log", "r") as f:
                  log = f.read()
          except:
              log = "No logs found."

          msg = MIMEText(f"❌ YouTube upload failed.\n\nError log:\n\n{log}")
          msg['Subject'] = "YouTube Automation Failed"
          msg['From'] = os.environ['EMAIL_USER']
          msg['To'] = os.environ['EMAIL_TO']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login(os.environ['EMAIL_USER'], os.environ['EMAIL_PASS'])
              server.send_message(msg)
          EOF
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}